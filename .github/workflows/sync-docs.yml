name: Sync Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 0

      - name: Checkout docs repository
        uses: actions/checkout@v4
        with:
          repository: ilokesto/docs
          token: ${{ secrets.DOCS_SYNC_TOKEN }}
          path: docs

      - name: Set up Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync docs to docs repository
        run: |
          rm -rf docs/content/docs/fetcher
          mkdir -p docs/content/docs/fetcher
          cp -R source/docs/* docs/content/docs/fetcher/

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.DOCS_SYNC_TOKEN }}
          path: docs
          branch: sync-docs/fetcher-${{ github.run_id }}
          title: "docs: sync from fetcher"
          body: |
            Automated documentation sync from ${{ github.repository }}@${{ github.sha }}.

            Changed files in `docs/` folder of source repository are copied to `content/docs/fetcher/`.
          commit-message: "docs: sync from fetcher"
          delete-branch: true
